name: auditx CI

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
  pull_request:
    branches: [main]
    paths:
      - 'cli/**'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  self-audit:
    name: auditx scans itself
    runs-on: ubuntu-latest
    needs: build-and-test

    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install gitleaks
        run: |
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Install trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Install semgrep
        run: pip install semgrep

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run auditx on itself
        run: |
          node dist/bin/auditx.js .. --output terminal --severity high
        continue-on-error: true  # Don't fail CI on findings during initial development
