rules:
  # ─────────────────────────────────────────────
  # ORIGINAL 6
  # ─────────────────────────────────────────────

  - id: ai-silent-catch
    message: >
      Empty catch block swallows errors silently. Add logging or re-throw.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern: |
          try { ... } catch ($E) { }

  - id: ai-meaningless-wrapper
    message: >
      Function does nothing but delegate to another function with same args.
      Delete wrapper, call inner directly.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: |
          function $F($A) { return $G($A); }
      - pattern: |
          const $F = ($A) => { return $G($A); }
      - pattern: |
          const $F = ($A) => $G($A)

  - id: ai-foreach-push
    message: >
      .forEach + .push is imperative. Use .map() instead.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      $ARR.forEach($ITEM => { ...; $OUT.push(...); })

  - id: ai-redundant-promise
    message: >
      Wrapping already-resolved value in new Promise/Promise.resolve is redundant.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: return new Promise((resolve) => resolve($X))
      - pattern: return new Promise((resolve, reject) => resolve($X))
      - pattern: return Promise.resolve(await $X)

  - id: ai-redundant-boolean-compare
    message: >
      Comparing to true/false literally. Use value directly or negate with !.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: if ($X === true) { ... }
      - pattern: if ($X == true) { ... }
      - pattern: if ($X === false) { ... }
      - pattern: if ($X == false) { ... }

  - id: ai-redundant-return-await
    message: >
      `return await` inside async function is redundant outside try/catch.
    severity: INFO
    languages: [javascript, typescript]
    patterns:
      - pattern: return await $P
      - pattern-inside: async function $F(...) { ... }
      - pattern-not-inside: |
          try {
            ...
          } catch ($E) {
            ...
          }
      - pattern-not-inside: |
          try {
            ...
          } catch {
            ...
          }
      - pattern-not-inside: |
          try {
            ...
          } finally {
            ...
          }

  # ─────────────────────────────────────────────
  # ERROR HANDLING
  # ─────────────────────────────────────────────

  - id: ai-console-log-catch
    message: >
      Logging error and doing nothing is barely better than silencing it.
      Handle it, re-throw, or surface to caller.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: |
          try { ... } catch ($E) { console.log($E); }
      - pattern: |
          try { ... } catch ($E) { console.error($E); }
      - pattern: |
          try { ... } catch ($E) { console.warn($E); }

  - id: ai-catch-reassign-ignore
    message: >
      Catching error, assigning to var, never using it. Effectively silent catch.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      try { ... } catch ($E) { $VAR = $E; }

  - id: ai-generic-error-message
    message: >
      Generic error message loses context. Include operation, inputs, cause.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: throw new Error("Something went wrong")
      - pattern: throw new Error("An error occurred")
      - pattern: throw new Error("Error")
      - pattern: throw new Error("Failed")

  # ─────────────────────────────────────────────
  # ASYNC / PROMISE
  # ─────────────────────────────────────────────

  - id: ai-promise-in-loop
    message: >
      Awaiting inside for/while loop runs sequentially. Use Promise.all()
      unless order matters.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: |
          for ($I of $ARR) { ...; await $F(...); }
      - pattern: |
          for (let $I = ...; ...; ...) { ...; await $F(...); }
      - pattern: |
          while (...) { ...; await $F(...); }

  # FIXED: was matching every function call in codebase. Narrowed to
  # known async-ish call names + no await/catch/return guard.
  - id: ai-floating-promise
    message: >
      Likely-async call not awaited and no .catch attached. Unhandled
      rejection risk.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: $F(...)
          - pattern: $OBJ.$METHOD(...)
      - pattern-not: await $F(...)
      - pattern-not: await $OBJ.$METHOD(...)
      - pattern-not: return $F(...)
      - pattern-not: return $OBJ.$METHOD(...)
      - pattern-not: $F(...).catch(...)
      - pattern-not: $OBJ.$METHOD(...).catch(...)
      - pattern-not: void $F(...)
      - metavariable-regex:
          metavariable: $F
          regex: ^(fetch|axios|save|create|update|delete|remove|send|write|sync|fs)\w*$

  - id: ai-async-foreach
    message: >
      .forEach does not await async callbacks. Use for...of or
      Promise.all(arr.map(...)).
    severity: ERROR
    languages: [javascript, typescript]
    pattern: |
      $ARR.forEach(async ($ITEM) => { ... })

  - id: ai-new-promise-executor-async
    message: >
      Async function inside `new Promise` executor. Errors thrown inside
      are swallowed. Use async/await directly.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      new Promise(async ($RESOLVE, $REJECT) => { ... })

  - id: ai-then-catch-mixed-with-await
    message: >
      Mixing .then()/.catch() with async/await in same function. Pick one style.
    severity: INFO
    languages: [javascript, typescript]
    pattern: |
      async function $F(...) { ...; $P.then(...); ... }

  # ─────────────────────────────────────────────
  # OVER-ENGINEERING
  # ─────────────────────────────────────────────

  # DOWNGRADED: legit pattern (debug naming, stack clarity). Was top noise source.
  - id: ai-single-use-variable
    message: >
      Variable assigned once, used once immediately after. Consider inlining.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: |
          const $X = $EXPR;
          return $X;
      - pattern: |
          let $X = $EXPR;
          return $X;

  - id: ai-useless-else-after-return
    message: >
      `else` after `return` is unreachable-logic pattern. Remove else, dedent.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      if (...) { ...; return ...; } else { ... }

  - id: ai-ternary-to-boolean
    message: >
      `condition ? true : false` is identical to `condition` (or `!!condition`).
    severity: INFO
    languages: [javascript, typescript]
    fix: "$X"
    pattern-either:
      - pattern: "$X ? true : false"

  - id: ai-double-negation
    message: >
      `!!value` to coerce boolean usually unnecessary. Use Boolean(value).
    severity: INFO
    languages: [javascript, typescript]
    fix: "Boolean($X)"
    pattern: "!!$X"

  - id: ai-object-spread-self
    message: Spreading object into itself is redundant.
    severity: WARNING
    languages: [javascript, typescript]
    fix: "{ ...$O }"
    pattern: "{ ...$O, ...$O }"

  - id: ai-typeof-equals-string-redundant
    message: >
      Comparing typeof to a non-standard type string. Always returns false.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: typeof $X === "integer"
      - pattern: typeof $X === "float"
      - pattern: typeof $X === "array"
      - pattern: typeof $X === "null"
      - pattern: typeof $X === "class"

  # ─────────────────────────────────────────────
  # CONSOLE / LOGGING
  # ─────────────────────────────────────────────

  # FIXED: excludes tool's own cli/bin/scripts + tests from false-positiving on
  # legitimate CLI stdout usage (auditx itself uses console.log everywhere).
  - id: ai-console-log-leak
    message: >
      console.log in production code. Use a proper logger (pino, winston)
      with log levels.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: console.log(...)
    paths:
      exclude:
        - "*.test.*"
        - "*.spec.*"
        - "**/__tests__/**"
        - "**/cli/**"
        - "**/bin/**"
        - "**/scripts/**"

  - id: ai-console-log-json-stringify
    message: console.log(JSON.stringify(...)) — AI debug pattern, remove before shipping.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: console.log(JSON.stringify(...))
    paths:
      exclude:
        - "*.test.*"
        - "*.spec.*"

  - id: ai-debugger-statement
    message: >
      `debugger` left in code. Pauses execution in attached DevTools.
    severity: ERROR
    languages: [javascript, typescript]
    fix: ""
    pattern: debugger;


  # ─────────────────────────────────────────────
  # OBJECT / ARRAY
  # ─────────────────────────────────────────────

  # FIXED message to match actual pattern (was describing >0 case it doesn't check)
  - id: ai-array-length-check-wrong
    message: >
      `arr.length === 0` — consider `!arr.length` for idiomatic empty check.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: if ($A.length == 0) { ... }
      - pattern: if ($A.length === 0) { ... }

  # FIXED: now excludes already-wrapped calls (was firing regardless of try/catch)
  - id: ai-json-parse-no-try
    message: >
      JSON.parse without try/catch throws on malformed input.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern: JSON.parse($X)
      - pattern-not-inside: |
          try { ... } catch (...) { ... }

  - id: ai-object-assign-to-empty
    message: >
      `Object.assign({}, obj)` is a shallow clone. Use spread `{ ...obj }`.
    severity: INFO
    languages: [javascript, typescript]
    fix: "{ ...$OBJ }"
    pattern: Object.assign({}, $OBJ)

  - id: ai-settimeout-zero
    message: >
      setTimeout($F, 0) hides timing dependencies. Use queueMicrotask()
      or restructure async flow.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: setTimeout($F, 0)
      - pattern: setTimeout(() => { ... }, 0)

  - id: ai-setinterval-no-clear
    message: >
      setInterval without stored reference can never be cleared.
      Assign to a variable.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern: setInterval($F, $N)
      - pattern-not-inside: |
          const $ID = setInterval($F, $N)
      - pattern-not-inside: |
          let $ID = setInterval($F, $N)

  # ─────────────────────────────────────────────
  # SECURITY
  # ─────────────────────────────────────────────

  - id: ai-math-random-crypto
    message: >
      Math.random() not cryptographically secure. Use crypto.randomUUID()
      or crypto.getRandomValues() for tokens/IDs.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: Math.random()

  - id: ai-hardcoded-localhost
    message: >
      Hardcoded localhost URL in non-test code. Use environment variables.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: "\"http://localhost:$PORT\""
      - pattern: "'http://localhost:$PORT'"
      - pattern: "`http://localhost:$PORT`"
    paths:
      exclude:
        - "*.test.*"
        - "*.spec.*"

  - id: ai-hardcoded-port
    message: "Hardcoded port. Use process.env.PORT or config."
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: app.listen(3000)
      - pattern: app.listen(8080)
      - pattern: app.listen(4000)
      - pattern: server.listen(3000)

  - id: ai-eval-usage
    message: "eval() executes arbitrary code. Never use — always has a safe alternative."
    severity: ERROR
    languages: [javascript, typescript]
    pattern: eval($X)

  - id: ai-innerHTML-assignment
    message: >
      Assigning innerHTML with dynamic content is an XSS vector.
      Use textContent, or DOMPurify.sanitize() first.
    severity: ERROR
    languages: [javascript, typescript]
    pattern: $EL.innerHTML = $X

  # ─────────────────────────────────────────────
  # CODE SMELL / MAINTAINABILITY
  # ─────────────────────────────────────────────

  - id: ai-magic-number
    message: "Magic number in logic. Extract to a named constant."
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: if ($X > 100) { ... }
      - pattern: if ($X > 1000) { ... }
      - pattern: if ($X === 42) { ... }
      - pattern: if ($X === 404) { ... }
      - pattern: if ($X === 200) { ... }

  - id: ai-todo-fixme-left
    message: >
      TODO/FIXME left in code. Accumulates as permanent technical debt.
    severity: INFO
    languages: [javascript, typescript]
    pattern-regex: "// (TODO|FIXME|HACK|XXX): .*"

  - id: ai-string-concat-template
    message: "String built with + concatenation. Use template literals."
    severity: INFO
    languages: [javascript, typescript]
    pattern: $A + " " + $B

  - id: ai-callback-hell
    message: "Deeply nested callbacks. Convert to async/await."
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      $F($A, function($B) {
        $G($B, function($C) {
          $H($C, function($D) { ... })
        })
      })

  - id: ai-var-usage
    message: >
      `var` declaration. Use const (default) or let (if reassigned).
    severity: INFO
    languages: [javascript, typescript]
    fix: "let $X = $Y"
    pattern: var $X = $Y

  - id: ai-loose-equality
    message: >
      Loose equality triggers type coercion. Use === / !==
      (== null is fine for null+undefined check).
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: if ($X == $Y) { ... }
          - pattern: if ($X != $Y) { ... }
      - pattern-not: if ($X == null) { ... }
      - pattern-not: if ($X != null) { ... }

  - id: ai-delete-object-key
    message: >
      `delete obj.key` mutates + de-optimizes V8 hidden class.
      Prefer destructuring rest: `const { key, ...rest } = obj`.
    severity: INFO
    languages: [javascript, typescript]
    pattern: delete $OBJ.$KEY

  - id: ai-arguments-object
    message: "`arguments` is legacy. Use rest parameters ...args."
    severity: WARNING
    languages: [javascript, typescript]
    pattern: "arguments[$IDX]"

  - id: ai-prototype-extend-native
    message: >
      Extending native prototypes causes global pollution, breaks other libs.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: Array.prototype.$METHOD = $F
      - pattern: Object.prototype.$METHOD = $F
      - pattern: String.prototype.$METHOD = $F
      - pattern: Number.prototype.$METHOD = $F

  - id: ai-class-no-constructor-body
    message: "Empty constructor. Remove — JS provides a default."
    severity: INFO
    languages: [javascript, typescript]
    pattern: |
      class $C {
        constructor() {}
        ...
      }

  - id: ai-switch-no-default
    message: >
      switch without default. Unhandled values silently do nothing.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      switch ($X) { case ...: ...; }

  - id: ai-math-random-crypto
    message: >
      Math.random() is not cryptographically secure and is predictable.
      Never use it for tokens, session IDs, or security values.
      Use crypto.randomBytes() or crypto.randomUUID() instead.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: Math.random().toString(...)
      - pattern: Math.random() * $N
      - pattern: Math.floor(Math.random() * $N)

  - id: ai-hardcoded-placeholder-secret
    message: >
      Hardcoded placeholder secret found. This is a typical LLM-generated stub
      that must be replaced with a real secret from an environment variable before deployment.
    severity: ERROR
    languages: [javascript, typescript, python]
    pattern-regex: "(?i)(YOUR_API_KEY|YOUR_SECRET|sk-[a-zA-Z0-9]{32,}|REPLACE_ME|INSERT_TOKEN|<API_KEY>|your-secret-key-here|changeme|abc123|password123)"

  - id: ai-env-secret-fallback
    message: >
      process.env.SECRET_KEY || 'hardcoded' silently activates a hardcoded secret
      if the env var is missing in production. Fail loudly instead:
      if (!process.env.SECRET_KEY) throw new Error('SECRET_KEY is required');
    severity: ERROR
    languages: [javascript, typescript]
    pattern-regex: "process\\.env\\.\\w*(KEY|SECRET|TOKEN|PASSWORD|PWD)\\w*\\s*\\|\\|\\s*['\"][^'\"]{4,}['\"]"

  - id: ai-inmemory-cache-no-ttl
    message: >
      Module-scoped Map/object used as a cache with no size limit or TTL eviction
      strategy. This is a guaranteed memory leak — the cache will grow unbounded
      in production until the process runs out of memory. Use lru-cache or node-cache.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern: "const $CACHE = new Map()"
      - pattern-not-inside: |
          class $C {
            ...
          }
      - pattern-not: "$CACHE.delete($KEY)"

  - id: ai-console-log-sensitive
    message: >
      console.log() potentially logging sensitive data (passwords, tokens, keys).
      Remove before deploying to production — these will appear in log aggregation services.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-regex: "console\\.(log|info|debug|warn|error)\\(.*(?i)(password|token|secret|key|auth|credential).*\\)"

  - id: ai-settimeout-zero
    message: >
      setTimeout(() => ..., 0) is used to defer execution to next tick.
      This is a code smell indicating a race condition or ordering problem.
      Use proper async/await or event-driven patterns instead.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: setTimeout($F, 0)
      - pattern: setTimeout(() => { ... }, 0)

  - id: ai-regex-redos
    message: >
      Regex with nested quantifiers like (a+)+ or (a|a)* is vulnerable to
      ReDoS (Regular Expression Denial of Service). Simplify or use a safe
      regex library.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-regex: "/\\([^)]*[+*]\\)[+*]/"

  - id: ai-prototype-pollution
    message: >
      Setting a property via dynamic key on an object literal can allow
      prototype pollution if key comes from user input (e.g., '__proto__').
      Validate key against an allowlist first.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern: $OBJ[$KEY] = $VAL
      - pattern-either:
          - pattern-inside: |
              function $F(req, ...) { ... }
          - pattern-inside: |
              ($REQ, ...) => { ... }

  - id: ai-jwt-decode-no-verify
    message: >
      jwt.decode() reads token contents without verifying the cryptographic signature.
      This allows attackers to forge tokens. Always use jwt.verify() instead.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern: jwt.decode(...)
      - pattern-not-inside: |
          jwt.verify(...)
          ...

  - id: ai-unhandled-json-parse
    message: >
      JSON.parse() outside of a try/catch block will crash the process if the input
      is invalid. LLMs often assume API responses or localStorage items are valid JSON.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: JSON.parse(...)
    pattern-not-inside: |
      try {
        ...
      } catch ($E) {
        ...
      }

  - id: ai-date-now-as-id
    message: >
      Date.now() is not a unique identifier. If multiple items are created in the
      same millisecond, this will cause key collisions (especially in React lists
      or DB inserts). Use crypto.randomUUID() or a counter.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: "{ id: Date.now(), ... }"
          - pattern: "key={Date.now()}"
          - pattern: "const id = Date.now()"

  - id: ai-sync-fs-in-handler
    message: >
      Synchronous fs methods (readFileSync, writeFileSync) block the Node.js event
      loop, halting all other concurrent requests. Use fs.promises inside async handlers.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: fs.readFileSync(...)
          - pattern: fs.writeFileSync(...)
          - pattern: fs.appendFileSync(...)
      - pattern-inside: |
          function $HANDLER($REQ, $RES, ...) {
            ...
          }

  - id: ai-promise-all-no-catch
    message: >
      Promise.all() with multiple mapped async calls that lack individual .catch()
    patterns:
      - pattern-either:
          - pattern: if ($X == $Y) { ... }
          - pattern: if ($X != $Y) { ... }
      - pattern-not: if ($X == null) { ... }
      - pattern-not: if ($X != null) { ... }

  - id: ai-delete-object-key
    message: >
      `delete obj.key` mutates + de-optimizes V8 hidden class.
      Prefer destructuring rest: `const { key, ...rest } = obj`.
    severity: INFO
    languages: [javascript, typescript]
    pattern: delete $OBJ.$KEY

  - id: ai-arguments-object
    message: "`arguments` is legacy. Use rest parameters ...args."
    severity: WARNING
    languages: [javascript, typescript]
    pattern: "arguments[$IDX]"

  - id: ai-prototype-extend-native
    message: >
      Extending native prototypes causes global pollution, breaks other libs.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: Array.prototype.$METHOD = $F
      - pattern: Object.prototype.$METHOD = $F
      - pattern: String.prototype.$METHOD = $F
      - pattern: Number.prototype.$METHOD = $F

  - id: ai-class-no-constructor-body
    message: "Empty constructor. Remove — JS provides a default."
    severity: INFO
    languages: [javascript, typescript]
    pattern: |
      class $C {
        constructor() {}
        ...
      }

  - id: ai-switch-no-default
    message: >
      switch without default. Unhandled values silently do nothing.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      switch ($X) { case ...: ...; }

  - id: ai-js-unhandled-fetch-response
    message: >
      Calling .json() on a fetch response without checking if response.ok is true.
      If the API returns a 404/500 HTML page, .json() throws a SyntaxError, crashing the app.
      LLMs almost always omit this check.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: |
              const $RES = await fetch(...)
              ...
              const $DATA = await $RES.json()
          - pattern: fetch(...).then(res => res.json())
      - pattern-not-inside: |
          if (!$RES.ok) { ... }
          ...
          const $DATA = await $RES.json()

  - id: ai-node-exec-concatenation
    message: >
      Concatenating variables into child_process.exec() is a command injection risk.
      Use child_process.execFile() or spawn() with an array of arguments instead.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: exec($CMD + $ARG)
          - pattern: exec(`...${$ARG}...`)

  - id: ai-js-buffer-alloc-unsafe
    message: >
      Buffer.allocUnsafe() allocates memory without clearing it, potentially leaking
      sensitive data from old memory chunks. Use Buffer.alloc() unless performance is critical,
      in which case you must immediately call .fill() on the buffer.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: Buffer.allocUnsafe(...)
    pattern-not-inside: |
      const $BUF = Buffer.allocUnsafe(...)
      $BUF.fill(...)

  - id: ai-js-for-in-has-own-property
    message: >
      for...in loop iterates over prototype properties as well. Always wrap the inner block
      with an Object.hasOwn(obj, key) or obj.hasOwnProperty(key) check to prevent unexpected behavior.
    severity: INFO
    languages: [javascript, typescript]
    patterns:
      - pattern: |
          for (const $KEY in $OBJ) {
            ...
          }
      - pattern-not-inside: |
          for (const $KEY in $OBJ) {
            if ($OBJ.hasOwnProperty($KEY)) { ... }
          }
      - pattern-not-inside: |
          for (const $KEY in $OBJ) {
            if (Object.hasOwn($OBJ, $KEY)) { ... }
          }
  - id: ai-math-random-crypto
    message: >
      Math.random() is not cryptographically secure and is predictable.
      Never use it for tokens, session IDs, or security values.
      Use crypto.randomBytes() or crypto.randomUUID() instead.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: Math.random().toString(...)
      - pattern: Math.random() * $N
      - pattern: Math.floor(Math.random() * $N)

  - id: ai-hardcoded-placeholder-secret
    message: >
      Hardcoded placeholder secret found. This is a typical LLM-generated stub
      that must be replaced with a real secret from an environment variable before deployment.
    severity: ERROR
    languages: [javascript, typescript, python]
    pattern-regex: "(?i)(YOUR_API_KEY|YOUR_SECRET|sk-[a-zA-Z0-9]{32,}|REPLACE_ME|INSERT_TOKEN|<API_KEY>|your-secret-key-here|changeme|abc123|password123)"

  - id: ai-env-secret-fallback
    message: >
      process.env.SECRET_KEY || 'hardcoded' silently activates a hardcoded secret
      if the env var is missing in production. Fail loudly instead:
      if (!process.env.SECRET_KEY) throw new Error('SECRET_KEY is required');
    severity: ERROR
    languages: [javascript, typescript]
    pattern-regex: "process\\.env\\.\\w*(KEY|SECRET|TOKEN|PASSWORD|PWD)\\w*\\s*\\|\\|\\s*['\"][^'\"]{4,}['\"]"

  - id: ai-inmemory-cache-no-ttl
    message: >
      Module-scoped Map/object used as a cache with no size limit or TTL eviction
      strategy. This is a guaranteed memory leak — the cache will grow unbounded
      in production until the process runs out of memory. Use lru-cache or node-cache.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern: "const $CACHE = new Map()"
      - pattern-not-inside: |
          class $C {
            ...
          }
      - pattern-not: "$CACHE.delete($KEY)"

  - id: ai-console-log-sensitive
    message: >
      console.log() potentially logging sensitive data (passwords, tokens, keys).
      Remove before deploying to production — these will appear in log aggregation services.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-regex: "console\\.(log|info|debug|warn|error)\\(.*(?i)(password|token|secret|key|auth|credential).*\\)"

  - id: ai-settimeout-zero
    message: >
      setTimeout(() => ..., 0) is used to defer execution to next tick.
      This is a code smell indicating a race condition or ordering problem.
      Use proper async/await or event-driven patterns instead.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: setTimeout($F, 0)
      - pattern: setTimeout(() => { ... }, 0)

  - id: ai-regex-redos
    message: >
      Regex with nested quantifiers like (a+)+ or (a|a)* is vulnerable to
      ReDoS (Regular Expression Denial of Service). Simplify or use a safe
      regex library.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-regex: "/\\([^)]*[+*]\\)[+*]/"

  - id: ai-prototype-pollution
    message: >
      Setting a property via dynamic key on an object literal can allow
      prototype pollution if key comes from user input (e.g., '__proto__').
      Validate key against an allowlist first.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern: $OBJ[$KEY] = $VAL
      - pattern-either:
          - pattern-inside: |
              function $F(req, ...) { ... }
          - pattern-inside: |
              ($REQ, ...) => { ... }

  - id: ai-jwt-decode-no-verify
    message: >
      jwt.decode() reads token contents without verifying the cryptographic signature.
      This allows attackers to forge tokens. Always use jwt.verify() instead.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern: jwt.decode(...)
      - pattern-not-inside: |
          jwt.verify(...)
          ...

  - id: ai-unhandled-json-parse
    message: >
      JSON.parse() outside of a try/catch block will crash the process if the input
      is invalid. LLMs often assume API responses or localStorage items are valid JSON.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: JSON.parse(...)
    pattern-not-inside: |
      try {
        ...
      } catch ($E) {
        ...
      }

  - id: ai-date-now-as-id
    message: >
      Date.now() is not a unique identifier. If multiple items are created in the
      same millisecond, this will cause key collisions (especially in React lists
      or DB inserts). Use crypto.randomUUID() or a counter.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: "{ id: Date.now(), ... }"
          - pattern: "key={Date.now()}"
          - pattern: "const id = Date.now()"

  - id: ai-sync-fs-in-handler
    message: >
      Synchronous fs methods (readFileSync, writeFileSync) block the Node.js event
      loop, halting all other concurrent requests. Use fs.promises inside async handlers.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: fs.readFileSync(...)
          - pattern: fs.writeFileSync(...)
          - pattern: fs.appendFileSync(...)
      - pattern-inside: |
          function $HANDLER($REQ, $RES, ...) {
            ...
          }

  - id: ai-promise-all-no-catch
    message: >
      Promise.all() with multiple mapped async calls that lack individual .catch()
      handlers. If one fails, the entire batch rejects. Use Promise.allSettled()
      or add .catch() to the inner promises.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern: Promise.all($ARR.map(async ($ITEM) => { ... }))
      - pattern-not-inside: Promise.all($ARR.map(async ($ITEM) => { ... }).map(p => p.catch(...)))

  - id: ai-js-eval-execution
    message: >
      Using eval() or new Function() to execute dynamic code is a critical RCE
      vulnerability if any part of the string is user-controlled.
      LLMs sometimes use this to parse complex JSON or execute math equations.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: eval(...)
      - pattern: new Function(...)
