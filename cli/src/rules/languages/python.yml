rules:
  - id: ai-python-print-leftover
    message: >
      `print()` statement left in code. Use the `logging` module for production applications.
    severity: WARNING
    languages: [python]
    pattern: print(...)

  - id: ai-python-bare-except
    message: >
      Bare `except:` catches SystemExit and KeyboardInterrupt. Use `except Exception:` instead.
    severity: WARNING
    languages: [python]
    pattern: |
      try:
        ...
      except:
        ...

  - id: ai-python-mutable-default-arg
    message: >
      Mutable default arguments (list, dict) are shared across all calls. Use `None` instead.
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: "def $F(..., $ARG=[], ...): ..."
      - pattern: "def $F(..., $ARG={}, ...): ..."

  - id: ai-python-assert-used
    message: >
      `assert` statements are removed when running Python with `-O`. Do not use for data validation or control flow.
    severity: WARNING
    languages: [python]
    pattern: assert ...

  - id: ai-python-exec-used
    message: >
      Use of `exec()` is highly dangerous and allows arbitrary code execution.
    severity: ERROR
    languages: [python]
    pattern: exec(...)

  - id: ai-python-flask-debug-true
    message: >
      Flask app run with `debug=True`. This enables the interactive debugger and allows arbitrary code execution.
    severity: ERROR
    languages: [python]
    pattern: $APP.run(..., debug=True, ...)

  - id: ai-python-silent-catch-print
    message: >
      Exception silenced with only a print(). Critical production errors will
      vanish silently. Use logging.exception(e) or re-raise.
    severity: ERROR
    languages: [python]
    pattern: |
      try:
        ...
      except $E:
        print(...)

  - id: ai-python-pickle-load
    message: >
      pickle.load() deserializes arbitrary Python objects — a critical RCE vulnerability.
      Never deserialize data from untrusted sources with pickle.
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)

  - id: ai-python-hardcoded-secret-env-fallback
    message: >
      Using os.getenv() with a hardcoded fallback secret. If the env var is
      missing in production, the hardcoded value silently becomes active.
      Fail loudly instead: os.environ['SECRET_KEY']
    severity: ERROR
    languages: [python]
    pattern-regex: "os\\.getenv\\(['\"]\\w*(KEY|SECRET|TOKEN|PASSWORD|PWD)\\w*['\"],\\s*['\"][^'\"]{4,}['\"]\\)"

  - id: ai-python-open-no-encoding
    message: >
      open() called without explicit encoding. This is locale-dependent and
      causes crashes on non-UTF-8 systems. Always use: open(f, encoding='utf-8').
    severity: INFO
    languages: [python]
    patterns:
      - pattern: open($PATH, $MODE)
      - pattern-not: open($PATH, $MODE, encoding=...)
      - pattern-not: open($PATH, encoding=...)

  - id: ai-python-requests-no-timeout
    message: >
      requests.get/post without a timeout will hang indefinitely if the server
      stalls, exhausting worker threads. Always add timeout=5.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: requests.get(...)
          - pattern: requests.post(...)
      - pattern-not: requests.get(..., timeout=$T, ...)
      - pattern-not: requests.post(..., timeout=$T, ...)

  - id: ai-python-subprocess-shell-true
    message: >
      subprocess.run with shell=True allows arbitrary command injection if
      any part of the command string is user-controlled.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern: subprocess.run(..., shell=True, ...)

  - id: ai-python-jinja2-no-autoescape
    message: >
      Jinja2 Environment initialized without autoescape=True.
      This allows Cross-Site Scripting (XSS) if rendering HTML templates.
    severity: ERROR
    languages: [python]
    pattern: Environment(...)
    pattern-not: Environment(..., autoescape=True, ...)

  - id: ai-python-fstring-sql
    message: >
      f-string used directly in cursor.execute(). This is SQL injection even
      if it's just a table name. Validate table names against an allowlist.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern: $CURSOR.execute(f"...")
