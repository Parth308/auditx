rules:
  - id: ai-golang-unhandled-error
    message: >
      Error returned by function is completely ignored. Handle it properly.
    severity: WARNING
    languages: [go]
    pattern: _, _ = $F(...)

  - id: ai-golang-goroutine-loop-variable
    message: >
      Using a loop variable inside a goroutine without passing it as an argument or re-assigning it. It will capture the last value of the loop.
    severity: ERROR
    languages: [go]
    pattern: |
      for $K, $V := range $MAP {
        go func() {
          ... $K ... $V ...
        }()
      }

  - id: ai-golang-defer-in-loop
    message: >
      `defer` inside a loop will only execute when the surrounding function returns, not at the end of each iteration. This can exhaust resources like file descriptors.
    severity: WARNING
    languages: [go]
    pattern: |
      for ... {
        ...
        defer $F(...)
        ...
      }

  - id: ai-golang-fmt-print
    message: >
      `fmt.Print*` used instead of a proper structured logger (e.g., `slog`, `zap`, `logrus`).
    severity: INFO
    languages: [go]
    pattern-either:
      - pattern: fmt.Println(...)
      - pattern: fmt.Printf(...)
      - pattern: fmt.Print(...)

  - id: ai-golang-crypto-md5
    message: >
      Use of MD5 is cryptographically broken and considered insecure for passwords or security hashes.
    severity: ERROR
    languages: [go]
    pattern: md5.New()

  - id: ai-golang-http-timeout-missing
    message: >
      http.Get() and http.Post() use the default http.Client which has no timeout.
      In production, a slow server will hang goroutines indefinitely, causing resource exhaustion.
      Use a custom client: &http.Client{Timeout: 10 * time.Second}.
    severity: ERROR
    languages: [go]
    pattern-either:
      - pattern: http.Get(...)
      - pattern: http.Post(...)
      - pattern: http.PostForm(...)

  - id: ai-golang-panic-in-handler
    message: >
      Calling panic() inside an HTTP handler will crash the entire server.
      Handle errors gracefully and return an appropriate HTTP error response instead.
    severity: ERROR
    languages: [go]
    pattern: |
      func $HANDLER($W http.ResponseWriter, $R *http.Request) {
        ...
        panic($MSG)
        ...
      }

  - id: ai-golang-context-todo
    message: >
      context.TODO() is a placeholder. In production code, pass a real context
      from the caller (e.g., r.Context()) to enable proper cancellation and deadlines.
    severity: WARNING
    languages: [go]
    pattern: context.TODO()

  - id: ai-golang-ioutil-deprecated
    message: >
      ioutil.ReadAll, ioutil.ReadFile etc are deprecated since Go 1.16.
      Use io.ReadAll, os.ReadFile, etc instead.
    severity: INFO
    languages: [go]
    pattern-either:
      - pattern: ioutil.ReadAll(...)
      - pattern: ioutil.ReadFile(...)
      - pattern: ioutil.WriteFile(...)
      - pattern: ioutil.TempFile(...)

  - id: ai-golang-sha1-password
    message: >
      SHA1 is cryptographically broken. Never use it for password hashing or
      security-sensitive operations. Use bcrypt, argon2id, or scrypt instead.
    severity: ERROR
    languages: [go]
    pattern: sha1.New()

  - id: ai-golang-missing-rows-close
    message: >
      db.Query() called without a subsequent defer rows.Close().
      This leaks database connections, eventually exhausting the connection pool.
    severity: ERROR
    languages: [go]
    patterns:
      - pattern: $ROWS, $ERR := $DB.Query(...)
      - pattern-not-inside: |
          $ROWS, $ERR := $DB.Query(...)
          ...
          defer $ROWS.Close()
          ...

  - id: ai-golang-math-rand-crypto
    message: >
      math/rand is not cryptographically secure. For tokens, passwords, or
      security keys, use crypto/rand instead.
    severity: ERROR
    languages: [go]
    patterns:
      - pattern: rand.$FUNC(...)
      - pattern-not-inside: |
          import "crypto/rand"
          ...

  - id: ai-golang-unsafe-slice-bounds
    message: >
      Accessing a slice immediately after split (e.g., strings.Split) without
      checking the length first. If the split fails, this will panic the server.
    severity: WARNING
    languages: [go]
    patterns:
      - pattern: strings.Split($S, $SEP)[$IDX]
