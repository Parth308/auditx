rules:
  # ─────────────────────────────────────────────
  # ORIGINAL 6 (kept, lightly cleaned)
  # ─────────────────────────────────────────────

  - id: ai-silent-catch
    message: >
      Empty catch block swallows errors silently. Classic AI anti-pattern —
      makes debugging impossible. Add logging or re-throw.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern: |
          try { ... } catch ($E) { }

  - id: ai-meaningless-wrapper
    message: >
      Function does nothing but delegate to another function with same args.
      Delete the wrapper and call the inner function directly.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: |
          function $F($A) { return $G($A); }
      - pattern: |
          const $F = ($A) => { return $G($A); }
      - pattern: |
          const $F = ($A) => $G($A)

  - id: ai-foreach-push
    message: >
      .forEach + .push is imperative. Use .map() — cleaner, returns array directly.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      $ARR.forEach($ITEM => { ...; $OUT.push(...); })

  - id: ai-redundant-promise
    message: >
      Wrapping already-resolved value in new Promise or Promise.resolve is redundant.
      Just return the value.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: return new Promise((resolve) => resolve($X))
      - pattern: return new Promise((resolve, reject) => resolve($X))
      - pattern: return Promise.resolve(await $X)

  - id: ai-redundant-boolean-compare
    message: >
      Comparing to true/false literally. Use the value directly or negate with !.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: if ($X === true) { ... }
      - pattern: if ($X == true) { ... }
      - pattern: if ($X === false) { ... }
      - pattern: if ($X == false) { ... }

  - id: ai-redundant-return-await
    message: >
      `return await` inside async function is redundant. The promise auto-unwraps.
      Exception: inside try/catch where you need the error in scope.
    severity: INFO
    languages: [javascript, typescript]
    pattern: |
      async function $F(...) { ...; return await $P; }

  # ─────────────────────────────────────────────
  # ERROR HANDLING ANTI-PATTERNS
  # ─────────────────────────────────────────────

  - id: ai-console-log-catch
    message: >
      Logging error and doing nothing is barely better than silencing it.
      Either handle the error, re-throw, or surface it to the caller.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: |
          try { ... } catch ($E) { console.log($E); }
      - pattern: |
          try { ... } catch ($E) { console.error($E); }
      - pattern: |
          try { ... } catch ($E) { console.warn($E); }

  - id: ai-catch-reassign-ignore
    message: >
      Catching error, assigning to variable, then never using it. Effectively silent catch.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      try { ... } catch ($E) { $VAR = $E; }

  - id: ai-generic-error-message
    message: >
      Throwing Error with generic message loses context. Include the operation,
      inputs, and underlying cause.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: throw new Error("Something went wrong")
      - pattern: throw new Error("An error occurred")
      - pattern: throw new Error("Error")
      - pattern: throw new Error("Failed")

  # ─────────────────────────────────────────────
  # ASYNC / PROMISE ANTI-PATTERNS
  # ─────────────────────────────────────────────

  - id: ai-promise-in-loop
    message: >
      Awaiting inside a for/while loop runs promises sequentially.
      Use Promise.all() for parallel execution unless order matters.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: |
          for ($I of $ARR) { ...; await $F(...); }
      - pattern: |
          for (let $I = ...; ...; ...) { ...; await $F(...); }
      - pattern: |
          while (...) { ...; await $F(...); }

  - id: ai-floating-promise
    message: >
      Promise not awaited and not caught. Unhandled rejections crash Node.js silently.
      Either await it or attach .catch().
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: $F();
      - pattern: $OBJ.$METHOD();
    # narrow via metavariable-type if semgrep supports it in your ruleset

  - id: ai-async-foreach
    message: >
      .forEach does not await async callbacks. Use `for...of` or `Promise.all(arr.map(...))`.
    severity: ERROR
    languages: [javascript, typescript]
    pattern: |
      $ARR.forEach(async ($ITEM) => { ... })

  - id: ai-new-promise-executor-async
    message: >
      Async function inside `new Promise` executor is an anti-pattern.
      Errors thrown inside async executor are swallowed. Use async/await directly.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      new Promise(async ($RESOLVE, $REJECT) => { ... })

  - id: ai-then-catch-mixed-with-await
    message: >
      Mixing .then()/.catch() chains with async/await in same function.
      Pick one style — inconsistency makes control flow hard to trace.
    severity: INFO
    languages: [javascript, typescript]
    pattern: |
      async function $F(...) { ...; $P.then(...); ... }

  # ─────────────────────────────────────────────
  # UNNECESSARY ABSTRACTION / OVER-ENGINEERING
  # ─────────────────────────────────────────────

  - id: ai-single-use-variable
    message: >
      Variable assigned once and used once immediately after. Inline it — the
      extra name adds no clarity and AI over-generates these.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: |
          const $X = $EXPR;
          return $X;
      - pattern: |
          let $X = $EXPR;
          return $X;

  - id: ai-useless-else-after-return
    message: >
      `else` block after `return` is unreachable logic. Remove the else —
      code inside executes only when condition is false anyway.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      if (...) { ...; return ...; } else { ... }

  - id: ai-ternary-to-boolean
    message: >
      `condition ? true : false` is identical to just `condition` (or `!!condition`).
      AI generates these constantly.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: "$X ? true : false"
      - pattern: "$X ? false : true"

  - id: ai-double-negation
    message: >
      `!!value` to coerce boolean is usually unnecessary. Just use the value
      in a boolean context, or Boolean(value) for explicitness.
    severity: INFO
    languages: [javascript, typescript]
    pattern: "!!$X"

  - id: ai-object-spread-self
    message: >
      Spreading object into itself `{ ...$OBJ, ...$OBJ }` is redundant.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: "{ ...$O, ...$O }"

  - id: ai-typeof-equals-string-redundant
    message: >
      Comparing typeof to a non-standard type string. Valid typeof values are:
      "undefined" "boolean" "number" "bigint" "string" "symbol" "function" "object".
      Any other string always returns false.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: typeof $X === "integer"
      - pattern: typeof $X === "float"
      - pattern: typeof $X === "array"
      - pattern: typeof $X === "null"
      - pattern: typeof $X === "class"

  # ─────────────────────────────────────────────
  # CONSOLE / LOGGING LEAKAGE
  # ─────────────────────────────────────────────

  - id: ai-console-log-leak
    message: >
      console.log in production code. AI leaves debug logging everywhere.
      Use a proper logger (pino, winston) with log levels.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: console.log(...)

  - id: ai-console-log-json-stringify
    message: >
      console.log(JSON.stringify(...)) — AI debug pattern. Remove before shipping.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: console.log(JSON.stringify(...))

  - id: ai-debugger-statement
    message: >
      `debugger` statement left in code. Will pause execution in any attached DevTools.
    severity: ERROR
    languages: [javascript, typescript]
    pattern: debugger;

  # ─────────────────────────────────────────────
  # TYPE SAFETY ESCAPES (TypeScript)
  # ─────────────────────────────────────────────

  - id: ai-ts-any-cast
    message: >
      `as any` cast defeats TypeScript entirely. AI uses this to silence type errors
      instead of fixing them. Type the value properly.
    severity: WARNING
    languages: [typescript]
    pattern: $X as any

  - id: ai-ts-ignore-comment
    message: >
      @ts-ignore suppresses TypeScript errors without fixing them.
      Use @ts-expect-error with a comment explaining why, or fix the type.
    severity: WARNING
    languages: [typescript]
    pattern-regex: "// @ts-ignore"

  - id: ai-ts-nocheck
    message: >
      @ts-nocheck disables type checking for the entire file. Never acceptable in prod.
    severity: ERROR
    languages: [typescript]
    pattern-regex: "// @ts-nocheck"

  - id: ai-ts-nonNull-assertion-chain
    message: >
      Chaining non-null assertions `a!.b!.c!` means you've given up on type safety.
      Add proper null checks or optional chaining with a fallback.
    severity: WARNING
    languages: [typescript]
    pattern: $A!.$B!

  - id: ai-any-function-param
    message: >
      Function parameter typed as `any`. Defeats purpose of TypeScript.
      Type the parameter explicitly.
    severity: WARNING
    languages: [typescript]
    pattern-either:
      - pattern: "function $F($P: any) { ... }"
      - pattern: "const $F = ($P: any) => { ... }"
      - pattern: "const $F = ($P: any) => $EXPR"

  # ─────────────────────────────────────────────
  # OBJECT / ARRAY ANTI-PATTERNS
  # ─────────────────────────────────────────────

  - id: ai-array-length-check-wrong
    message: >
      Using `arr.length > 0` is fine but `arr.length === 0` should be `!arr.length`
      or better yet check for existence before length.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: if ($A.length == 0) { ... }
      - pattern: if ($A.length === 0) { ... }

  - id: ai-json-parse-no-try
    message: >
      JSON.parse without try/catch throws on malformed input. Always wrap in try/catch.
    severity: ERROR
    languages: [javascript, typescript]
    pattern: JSON.parse($X)
    # exclude patterns where it's already inside try block via path filter

  - id: ai-object-assign-to-empty
    message: >
      `Object.assign({}, obj)` is a shallow clone. Use spread `{ ...obj }` instead —
      cleaner, more idiomatic, and less AI-boilerplate.
    severity: INFO
    languages: [javascript, typescript]
    pattern: Object.assign({}, $OBJ)

  - id: ai-settimeout-zero
    message: >
      setTimeout($F, 0) used to defer execution. This is a code smell — it hides
      timing dependencies. Use queueMicrotask() or restructure the async flow.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: setTimeout($F, 0)
      - pattern: setTimeout(() => { ... }, 0)

  - id: ai-setinterval-no-clear
    message: >
      setInterval without a stored reference means you can never clear it.
      Always assign to a variable: `const id = setInterval(...)`.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: "setInterval($F, $N)"

  # ─────────────────────────────────────────────
  # SECURITY PATTERNS (AI-specific additions)
  # ─────────────────────────────────────────────

  - id: ai-math-random-crypto
    message: >
      Math.random() is not cryptographically secure. For tokens, IDs, or anything
      security-sensitive use `crypto.randomUUID()` or `crypto.getRandomValues()`.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: Math.random()

  - id: ai-hardcoded-localhost
    message: >
      Hardcoded localhost URL in non-test code. Use environment variables for service URLs.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: "\"http://localhost:$PORT\""
      - pattern: "'http://localhost:$PORT'"
      - pattern: "`http://localhost:$PORT`"

  - id: ai-hardcoded-port
    message: >
      Hardcoded port number. Should come from `process.env.PORT` or config.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: app.listen(3000)
      - pattern: app.listen(8080)
      - pattern: app.listen(4000)
      - pattern: server.listen(3000)

  - id: ai-eval-usage
    message: >
      eval() executes arbitrary code. Never use. AI sometimes generates this for
      dynamic logic — always has a safe alternative.
    severity: ERROR
    languages: [javascript, typescript]
    pattern: eval($X)

  - id: ai-innerHTML-assignment
    message: >
      Assigning to innerHTML with dynamic content is an XSS vector.
      Use textContent for text, or DOMPurify.sanitize() before innerHTML.
    severity: ERROR
    languages: [javascript, typescript]
    pattern: $EL.innerHTML = $X

  # ─────────────────────────────────────────────
  # REACT-SPECIFIC AI ANTI-PATTERNS
  # ─────────────────────────────────────────────

  - id: ai-react-useeffect-no-deps
    message: >
      useEffect with no dependency array runs after every render.
      This is almost never intentional — add a deps array [].
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      useEffect(() => { ... })

  - id: ai-react-key-index
    message: >
      Using array index as React key. Causes incorrect reconciliation when list order
      changes. Use a stable unique ID from the data.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-regex: \.map\([^,]+,\s*(?<idx>[a-zA-Z0-9_]+)\s*\)\s*=>\s*<[^>]+key=\{\k<idx>\}

  - id: ai-react-state-mutate-direct
    message: >
      Directly mutating state object. React won't detect the change — use setState
      with a new object reference.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: $STATE.$PROP = $VAL
      - pattern: $STATE.push($VAL)

  - id: ai-react-usestate-object-no-spread
    message: >
      Replacing entire object state without spreading previous state loses other fields.
      Use `setState(prev => ({ ...prev, $KEY: $VAL }))`.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      $SET({ $KEY: $VAL })

  # ─────────────────────────────────────────────
  # CODE SMELL / MAINTAINABILITY
  # ─────────────────────────────────────────────

  - id: ai-magic-number
    message: >
      Magic number in logic. Extract to a named constant for readability.
      (Excludes 0, 1, -1 which are idiomatic.)
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: if ($X > 100) { ... }
      - pattern: if ($X > 1000) { ... }
      - pattern: if ($X === 42) { ... }
      - pattern: if ($X === 404) { ... }
      - pattern: if ($X === 200) { ... }

  - id: ai-todo-fixme-left
    message: >
      TODO/FIXME comment left in code. AI generates these as placeholders and
      they accumulate as permanent technical debt.
    severity: INFO
    languages: [javascript, typescript]
    pattern-regex: "// (TODO|FIXME|HACK|XXX): .*"

  - id: ai-string-concat-template
    message: >
      String built with + concatenation. Use template literals for readability.
      AI mixes both styles constantly.
    severity: INFO
    languages: [javascript, typescript]
    pattern: $A + " " + $B

  - id: ai-callback-hell
    message: >
      Deeply nested callbacks. Convert to async/await or Promise chains.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      $F($A, function($B) {
        $G($B, function($C) {
          $H($C, function($D) { ... })
        })
      })

  - id: ai-var-usage
    message: >
      `var` declaration. Use `const` (default) or `let` (if reassigned).
      `var` has function scope and hoisting — source of subtle bugs.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: var $X = $Y

  - id: ai-loose-equality
    message: >
      Loose equality `==` / `!=` triggers type coercion. Use `===` / `!==`.
      AI sometimes generates this when comparing to null (use `== null` only for null+undefined check).
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: if ($X == $Y) { ... }
      - pattern: if ($X != $Y) { ... }

  - id: ai-delete-object-key
    message: >
      `delete obj.key` mutates the object and is slow (de-optimizes V8 hidden class).
      Prefer object destructuring rest: `const { key, ...rest } = obj`.
    severity: INFO
    languages: [javascript, typescript]
    pattern: delete $OBJ.$KEY

  - id: ai-arguments-object
    message: >
      `arguments` object is legacy. Use rest parameters `...args` instead.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: "arguments[$IDX]"

  - id: ai-prototype-extend-native
    message: >
      Extending native prototypes (Array, Object, String) causes global pollution
      and breaks other libraries. Never do this.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: Array.prototype.$METHOD = $F
      - pattern: Object.prototype.$METHOD = $F
      - pattern: String.prototype.$METHOD = $F
      - pattern: Number.prototype.$METHOD = $F

  - id: ai-class-no-constructor-body
    message: >
      Class with empty constructor. Remove it — JavaScript provides a default.
    severity: INFO
    languages: [javascript, typescript]
    pattern: |
      class $C {
        constructor() {}
        ...
      }

  - id: ai-switch-no-default
    message: >
      switch statement without default case. Unhandled values silently do nothing.
      Add a default that throws or logs.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      switch ($X) { case ...: ...; }