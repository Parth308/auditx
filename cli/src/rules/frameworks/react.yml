rules:
  - id: ai-react-useeffect-no-deps
    message: >
      useEffect with no dependency array runs after every render.
      Add a deps array.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      useEffect(() => { ... })

  - id: ai-react-key-index
    message: >
      Array index as React key. Breaks reconciliation on reorder.
      Use stable unique ID.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-regex: \.map\([^,]+,\s*(?<idx>[a-zA-Z0-9_]+)\s*\)\s*=>\s*<[^>]+key=\{\k<idx>\}

  - id: ai-react-state-mutate-direct
    message: >
      Directly mutating state object. React won't detect change —
      use setState with new reference.
    severity: ERROR
    languages: [javascript, typescript]
    paths:
      include:
        - "*.jsx"
        - "*.tsx"
    patterns:
      - pattern-inside: |
          const [$STATE, $SET] = useState(...);
          ...
      - pattern-either:
          - pattern: $STATE.$PROP = $VAL
          - pattern: $STATE.push($VAL)

  - id: ai-react-usestate-object-no-spread
    message: >
      Replacing entire object state without spreading previous state loses
      other fields. Use `setState(prev => ({ ...prev, key: val }))`.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern: "$SET({ $KEY: $VAL })"
      - metavariable-regex:
          metavariable: $SET
          regex: ^set[A-Z]\w*$

  - id: ai-react-uncanceled-fetch
    message: >
      fetch() inside useEffect without AbortController cleanup causes
      memory leaks and race conditions when the component unmounts.
      Add: const ctrl = new AbortController(); ... return () => ctrl.abort();
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern: |
          useEffect(() => {
            ...
            fetch($URL)
            ...
          }, ...)
      - pattern-not: |
          useEffect(() => {
            ...
            new AbortController()
            ...
          }, ...)

  - id: ai-react-useeffect-missing-cleanup
    message: >
      useEffect adds an event listener or timer without returning a cleanup function.
      This causes memory leaks when the component unmounts.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: |
              useEffect(() => {
                ...
                window.addEventListener(...)
                ...
              }, ...)
          - pattern: |
              useEffect(() => {
                ...
                setInterval(...)
                ...
              }, ...)
      - pattern-not: |
          useEffect(() => {
            ...
            return () => { ... }
          }, ...)

  - id: ai-react-dangerously-set-innerhtml
    message: >
      dangerouslySetInnerHTML bypasses React's XSS protection.
      Sanitize HTML with DOMPurify before setting.
    severity: ERROR
    languages: [javascript, typescript]
    pattern: "<$ELEM ... dangerouslySetInnerHTML={{ __html: $VAL }} ... />"
    pattern-not: "<$ELEM ... dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(...) }} ... />"

  - id: ai-react-stale-interval-closure
    message: >
      setInterval inside useEffect referencing state without functional
      setState causes stale closures — the interval captures the initial
      value of the state and never updates. Use setState(prev => prev + 1).
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern-inside: |
          const [$STATE, $SET] = useState(...);
          ...
      - pattern: |
          useEffect(() => {
            ...
            setInterval(() => {
              ...
              $SET(...)
              ...
            }, ...)
            ...
          }, ...)

  - id: ai-react-props-spreading-all
    message: >
      Spreading all props {...props} into a DOM element passes unknown
      HTML attributes and can introduce XSS vectors or unintended behavior.
      Destructure only the props you need.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-regex: '<[a-z][a-zA-Z]*\s+\{\.\.\.props\}'

  - id: ai-react-inline-function-heavy
    message: >
      Defining a complex function directly inside JSX creates a new function
      on every render, preventing memoization. Extract it or wrap with useCallback.
    severity: INFO
    languages: [javascript, typescript]
    pattern: "<$ELEM ... $PROP={($ARGS) => { $STMT1; $STMT2; ... }} ... />"

  - id: ai-react-missing-suspense
    message: >
      React.lazy() components must be wrapped in a <Suspense> boundary.
      LLMs often suggest lazy() but forget the wrapper, crashing the app on load.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern: const $COMP = React.lazy(...)
      - pattern-not-inside: |
          <Suspense fallback={...}>
            ...
          </Suspense>

  - id: ai-react-usememo-overuse
    message: >
      useMemo used on a simple arithmetic or boolean expression. Hook overhead
      exceeds calculation cost. Remove useMemo and calculate directly.
    severity: INFO
    languages: [javascript, typescript]
    pattern-either:
      - pattern: useMemo(() => $A + $B, ...)
      - pattern: useMemo(() => $A || $B, ...)
      - pattern: useMemo(() => $A === $B, ...)

  - id: ai-react-useref-mutation-render
    message: >
      Mutating a ref (ref.current = ...) during the render phase can cause
      inconsistent UI and breaks Concurrent Mode. Move mutation to useEffect
      or an event handler.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern: $REF.current = $VAL
      - pattern-inside: |
          function $F(...) {
            ...
            return <$TAG ...>...</$TAG>;
          }
      - pattern-not-inside: |
          useEffect(...)
      - pattern-not-inside: |
          useLayoutEffect(...)
      - pattern-not-inside: |
          function $EVENTHANDLER(...) { ... }

  - id: ai-react-setstate-loop
    message: >
      Calling a state setter directly in the render body of a function component
      causes an infinite render loop. Wrap it in a useEffect or an event handler.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-inside: |
          const [$STATE, $SET] = useState(...);
          ...
      - pattern: $SET(...)
      - pattern-inside: |
          function $COMP(...) {
            ...
            return <$TAG ...>...</$TAG>;
          }
      - pattern-not-inside: |
          useEffect(...)
      - pattern-not-inside: |
          useLayoutEffect(...)
      - pattern-not-inside: |
          function $EVENTHANDLER(...) { ... }
