rules:
  - id: ai-nestjs-req-body
    message: >
      Extracting the body manually from `@Req()` bypasses NestJS validation pipes. Use `@Body()` instead to ensure DTO validation runs.
    severity: WARNING
    languages: [typescript]
    pattern: |
      @$METHOD(...)
      $F(@Req() $REQ, ...) {
        ...
        $REQ.body
        ...
      }

  - id: ai-nestjs-res-send
    message: >
      Using `@Res() res` and calling `res.send()` manually breaks NestJS interceptors and response mapping. Try to return the data directly from the controller.
    severity: INFO
    languages: [typescript]
    pattern: |
      @$METHOD(...)
      $F(..., @Res() $RES, ...) {
        ...
        $RES.send(...)
        ...
      }

  - id: ai-nestjs-global-prefix-hardcoded
    message: >
      Hardcoding route prefixes in `@Controller('api/v1/...')` makes versioning difficult. Use `app.setGlobalPrefix('api/v1')` in main.ts instead.
    severity: INFO
    languages: [typescript]
    pattern: "@Controller('api/v1/...')"

  - id: ai-nestjs-missing-guards
    message: >
      Controller lacks a @UseGuards() decorator. LLMs often create endpoints but
      forget to protect them with authentication. Ensure this is intentionally public.
    severity: WARNING
    languages: [typescript]
    pattern: |
      @Controller(...)
      export class $CLASS {
        ...
      }
    pattern-not-inside: |
      @UseGuards(...)
      @Controller(...)
      export class $CLASS {
        ...
      }

  - id: ai-nestjs-scope-request
    message: >
      Scope.REQUEST creates a new instance of the provider for every single request,
      killing performance and garbage collector efficiency. LLMs use this blindly
      to fix DI issues. Only use if absolutely necessary.
    severity: WARNING
    languages: [typescript]
    pattern: "@Injectable({ scope: Scope.REQUEST })"

  - id: ai-nestjs-empty-catch
    message: >
      @Catch() without arguments catches ALL exceptions globally, hiding crucial
      Internal Server Errors. Specify the exact exception (e.g., @Catch(HttpException)).
    severity: ERROR
    languages: [typescript]
    pattern: "@Catch()"
