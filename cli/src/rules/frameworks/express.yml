rules:
  - id: ai-express-no-return-after-send
    message: >
      Calling `res.send`, `res.json`, or `res.redirect` without `return` can lead to "Headers already sent" errors if execution continues. Add `return` before it, or return immediately after.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: |
      if (...) {
        ...
        res.$SEND(...)
        $SOMETHING_ELSE
      }
    metavariable-regex:
      metavariable: $SEND
      regex: ^(send|json|redirect|sendStatus|render)$

  - id: ai-express-next-no-return
    message: >
      Calling `next(err)` inside an `if` block without `return` continues execution. Add `return next(err)`.
    severity: ERROR
    languages: [javascript, typescript]
    pattern: |
      if (...) {
        ...
        next(...)
        $SOMETHING_ELSE
      }

  - id: ai-express-xss-res-send
    message: >
      Sending raw unescaped template literals in `res.send()` can lead to XSS. Use a template engine or sanitize input.
    severity: WARNING
    languages: [javascript, typescript]
    pattern: res.send(`...${...}...`)

  - id: ai-express-disable-x-powered-by
    message: >
      Express by default sends the `X-Powered-By: Express` header, which exposes your tech stack to attackers. Use `app.disable('x-powered-by')` or `helmet`.
    severity: INFO
    languages: [javascript, typescript]
    patterns:
      - pattern: const $APP = express()
      - pattern-not-inside: |
          const $APP = express()
          ...
          $APP.disable('x-powered-by')
      - pattern-not-inside: |
          const $APP = express()
          ...
          $APP.use(helmet())

  - id: ai-express-blind-cors
    message: >
      cors() called with no arguments allows ALL origins to make credentialed
      requests to your API. Whitelist specific origins: cors({ origin: ['https://your-app.com'] }).
    severity: ERROR
    languages: [javascript, typescript]
    pattern: $APP.use(cors())

  - id: ai-express-path-traversal
    message: >
      Serving files using user-controlled input in path.join(__dirname, req...) allows
      path traversal attacks (e.g., ../../etc/passwd). Validate and sanitize the input.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: res.sendFile(path.join(..., req.$INPUT))
      - pattern: res.sendFile(path.join(..., req.params.$P))
      - pattern: res.sendFile(path.join(..., req.query.$Q))

  - id: ai-express-missing-rate-limit
    message: >
      Express route defined without rate limiting middleware. Without rate limiting,
      attackers can brute-force credentials or perform denial-of-service attacks.
      Use express-rate-limit or similar.
    severity: INFO
    languages: [javascript, typescript]
    patterns:
      - pattern: $APP.post($ROUTE, $HANDLER)
      - metavariable-regex:
          metavariable: $ROUTE
          regex: .*(login|auth|signup|register|password|token).*

  - id: ai-floating-promise
    message: >
      Async function called without await, return, or .catch(). In Node.js, an
      unhandled rejection from a floating promise will crash the process.
      Add await or .catch(err => ...) to handle errors.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern: |
          async function $F(...) {
            ...
            $G(...)
            ...
          }
      - pattern-not: |
          async function $F(...) {
            ...
            await $G(...)
            ...
          }
      - pattern-not: |
          async function $F(...) {
            ...
            return $G(...)
            ...
          }
      - pattern-not: |
          async function $F(...) {
            ...
            $G(...).catch(...)
            ...
          }

  - id: ai-express-multer-no-limits
    message: >
      multer() initialized without file size limits allows infinite file uploads,
      causing disk exhaustion / DoS. Set limits: { fileSize: 5 * 1024 * 1024 }.
    severity: ERROR
    languages: [javascript, typescript]
    pattern: "multer({ dest: ... })"
    pattern-not: "multer({ dest: ..., limits: ... })"

  - id: ai-express-body-parser-no-limit
    message: >
      express.json() or express.urlencoded() without a limit allows large
      payloads. Ensure you set a reasonable limit, e.g. { limit: '1mb' }.
    severity: WARNING
    languages: [javascript, typescript]
    pattern-either:
      - pattern: express.json()
      - pattern: "express.urlencoded({ extended: true })"

  - id: ai-bcrypt-low-salt
    message: >
      bcrypt salt rounds set below 10 is insecure against modern hardware.
      Use at least 12 rounds for password hashing.
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: bcrypt.hash($PW, 1)
      - pattern: bcrypt.hash($PW, 2)
      - pattern: bcrypt.hash($PW, 3)
      - pattern: bcrypt.hash($PW, 4)
      - pattern: bcrypt.hash($PW, 5)
